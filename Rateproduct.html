<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanishq -Rating Product</title>
    <style>
        :root {
            --primary-gold: #ffcc00;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .rating-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
            transition: transform 0.3s ease;
        }

        .rating-card:hover {
            transform: translateY(-5px);
        }

        h2 { margin-bottom: 10px; color: var(--text-main); }
        p { color: #636e72; font-size: 0.9rem; margin-bottom: 25px; }
        .stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-direction: row-reverse; /* For easy CSS sibling selection */
        }

        .star {
            font-size: 45px;
            cursor: pointer;
            color: #dfe6e9;
            transition: all 0.2s ease;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }

        .star:hover,
        .star:hover ~ .star,
        .star.selected,
        .star.selected ~ .star {
            color: var(--primary-gold);
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
            transform: scale(1.1);
        }

        .star:active { transform: scale(0.9); }

        #emoji-display {
            font-size: 50px;
            margin: 20px 0 10px;
            height: 60px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #status-text {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 20px;
            display: block;
        }
        textarea {
            width: 100%;
            border: 2px solid #f1f2f6;
            border-radius: 12px;
            padding: 12px;
            resize: none;
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus { border-color: #764ba2; }

        .submit-btn {
            background: var(--bg-gradient);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: opacity 0.3s;
        }

        .submit-btn:hover { opacity: 0.9; }

    </style>
</head>
<body>

<div class="rating-card">
    <div id="emoji-display">⭐️</div>
    <h2>Rate this Product</h2>
    <p>How would you describe your experience?</p>

    <div class="stars" id="star-container">
        <span class="star" data-value="5">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="1">★</span>
    </div>

    <span id="status-text">Tap a star to rate</span>

    <textarea rows="3" placeholder="Additional comments..."></textarea>
    
    <button class="submit-btn" onclick="submitRating()">Submit Review</button>
</div>

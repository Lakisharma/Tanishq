<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanishq Delivered Successfully</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: #27ae60;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(39, 174, 96, 0.4);
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .order-details {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px dashed #ddd;
        }

        .order-details span {
            display: block;
            font-size: 13px;
            color: #888;
        }

        .order-details strong {
            color: #333;
            font-size: 16px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .btn {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: #9b59b6;
            color: white;
        }

        .btn-primary:hover {
            background: #8e44ad;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(155, 89, 182, 0.3);
        }

        .btn-outline {
            border: 2px solid #eee;
            color: #777;
        }

        .btn-outline:hover {
            background: #eee;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-container">
            <i class="fas fa-check"></i>
        </div>
        
        <h1>Order Delivered!</h1>
        <p>Yippee! Your package has been safely delivered. We hope you love your new purchase!</p>

        <div class="order-details">
            <span>Order ID: #TNQ-992834</span>
            <strong>Delivered on: April 23, 2026</strong>
        </div>

        <div class="btn-group">
            <a href="Rateproduct.html" class="btn btn-primary">Rate Product</a>
            <a href="index.html" class="btn btn-outline">Back to Home</a>
        </div>
    </div>

</body>
</html>
